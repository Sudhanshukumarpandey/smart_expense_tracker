{% extends "base.html" %}

{% block title %}
Edit Expense | Smart Expense Tracker
{% endblock %}

{% block content %}

<div class="topbar">

    <div>

        <h1>Edit Expense</h1>

        <p>
            Update your expense details.
        </p>

    </div>

</div>

<div class="expense-form-container">

    <form class="expense-form" method="POST">

        <div class="form-group">

            <label>Expense Name</label>

            <input
                type="text"
                name="expense_name"
                value="{{ expense.expense_name }}"
                required>

        </div>

        <div class="form-group">

            <label>Amount</label>

            <input
                type="number"
                step="0.01"
                name="amount"
                value="{{ expense.amount }}"
                required>

        </div>

        <div class="form-group">

            <label>Category</label>

            <select name="category">

                <option value="Food"
                {% if expense.category=="Food" %}selected{% endif %}>
                Food
                </option>

                <option value="Travel"
                {% if expense.category=="Travel" %}selected{% endif %}>
                Travel
                </option>

                <option value="Shopping"
                {% if expense.category=="Shopping" %}selected{% endif %}>
                Shopping
                </option>

                <option value="Bills"
                {% if expense.category=="Bills" %}selected{% endif %}>
                Bills
                </option>

                <option value="Entertainment"
                {% if expense.category=="Entertainment" %}selected{% endif %}>
                Entertainment
                </option>

                <option value="Education"
                {% if expense.category=="Education" %}selected{% endif %}>
                Education
                </option>

                <option value="Health"
                {% if expense.category=="Health" %}selected{% endif %}>
                Health
                </option>

                <option value="Other"
                {% if expense.category=="Other" %}selected{% endif %}>
                Other
                </option>

            </select>

        </div>

        <div class="form-group">

            <label>Expense Date</label>

            <input
                type="date"
                name="expense_date"
                value="{{ expense.expense_date }}"
                required>

        </div>

        <div class="form-group">

            <label>Payment Method</label>

            <select name="payment_method">

                <option value="UPI"
                {% if expense.payment_method=="UPI" %}selected{% endif %}>
                UPI
                </option>

                <option value="Cash"
                {% if expense.payment_method=="Cash" %}selected{% endif %}>
                Cash
                </option>

                <option value="Credit Card"
                {% if expense.payment_method=="Credit Card" %}selected{% endif %}>
                Credit Card
                </option>

                <option value="Debit Card"
                {% if expense.payment_method=="Debit Card" %}selected{% endif %}>
                Debit Card
                </option>

                <option value="Net Banking"
                {% if expense.payment_method=="Net Banking" %}selected{% endif %}>
                Net Banking
                </option>

            </select>

        </div>

        <button
            type="submit"
            class="save-btn">

            <i class="fa-solid fa-pen"></i>

            Update Expense

        </button>

    </form>

</div>

{% endblock %}
